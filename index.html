<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>AI Недвижимость</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 500px;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-left: 10px;
      border-radius: 8px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #results {
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .loading {
      margin-top: 20px;
      font-size: 18px;
    }

    .empty {
      margin-top: 20px;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>🏠 AI Поиск недвижимости</h1>

  <input id="query" placeholder="2к квартира центр до 50000" />
  <button onclick="search()">Найти</button>

  <div id="results"></div>

  <script>
    async function search() {
      const query = document.getElementById('query').value;
      const container = document.getElementById('results');

      container.innerHTML = '<div class="loading">🔍 Ищу лучшие варианты...</div>';

      try {
        const res = await fetch('http://localhost:3000/search?q=' + encodeURIComponent(query));
        const data = await res.json();

        container.innerHTML = '';

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="empty">😕 Ничего не найдено</div>';
          return;
        }

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'card';

          div.innerHTML = `
            <h3>${item.title}</h3>
            <p>💰 ${item.price} ${item.currency}</p>
            <p>📍 ${item.district || 'не указан'}</p>
            <p>🏢 ${item.residential_complex || '-'}</p>
            <a href="${item.link}" target="_blank">Открыть объявление</a>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        container.innerHTML = '<div class="empty">❌ Ошибка подключения к серверу</div>';
        console.error(err);
      }
    }
  </script>

</body>
</html>
