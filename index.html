<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>AI Недвижимость</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #f5f5f5; }
    h1 { margin-bottom: 20px; }
    input, select { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
    input { width: 500px; }
    button { padding: 12px 20px; font-size: 16px; margin-left: 10px; border-radius: 8px; border: none; background: black; color: white; cursor: pointer; }
    #results { margin-top: 30px; }
    .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .meta { color: #666; font-size: 14px; }
    .details { margin-top: 10px; padding: 10px; background: #fafafa; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>🏠 AI Поиск недвижимости</h1>

  <input id="query" placeholder="2к квартира центр до 50000" />
  <select id="source">
    <option value="all">Все источники</option>
    <option value="olx">OLX</option>
    <option value="rieltor">Rieltor.ua</option>
  </select>
  <button onclick="search()">Найти</button>

  <div id="results"></div>

  <script>
    function buildDetails(item) {
      const d = item.details || {};
      const parts = [];
      if (d.floor || d.floor_count) parts.push(`Этаж: ${d.floor ?? '-'} / ${d.floor_count ?? '-'}`);
      if (d.wall_type) parts.push(`Стены: ${d.wall_type}`);
      if (d.heating_system) parts.push(`Отопление: ${d.heating_system}`);
      if (d.support_programs) parts.push(`Программы: ${d.support_programs}`);
      return parts;
    }

    async function search() {
      const query = document.getElementById('query').value;
      const source = document.getElementById('source').value;
      const container = document.getElementById('results');

      container.innerHTML = '<div class="loading">🔍 Ищу лучшие варианты...</div>';

      try {
        const url = `http://localhost:3000/search?q=${encodeURIComponent(query)}&source=${encodeURIComponent(source)}`;
        const res = await fetch(url);
        const data = await res.json();

        container.innerHTML = '';
        if (!data || data.length === 0) {
          container.innerHTML = '<div class="empty">😕 Ничего не найдено</div>';
          return;
        }

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'card';
          const details = buildDetails(item);
          const detailsId = `d_${item.id}`;

          div.innerHTML = `
            <h3>${item.title}</h3>
            <p>💰 ${item.price} ${item.currency}</p>
            <p>📍 ${item.district || 'не указан'}</p>
            <p>🏢 ${item.residential_complex || '-'}</p>
            <p class="meta">Источник: <b>${item.source || 'unknown'}</b></p>
            ${details.length ? `<button onclick="toggleDetails('${detailsId}')">Подробнее</button>
            <div id="${detailsId}" class="details" style="display:none">${details.map(x => `<div>${x}</div>`).join('')}</div>` : ''}
            <a href="${item.link}" target="_blank">Открыть объявление</a>
          `;

          container.appendChild(div);
        });
      } catch (err) {
        container.innerHTML = '<div class="empty">❌ Ошибка подключения к серверу</div>';
      }
    }

    function toggleDetails(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }
  </script>
</body>
</html>
